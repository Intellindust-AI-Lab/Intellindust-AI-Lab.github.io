        function updateStats(data) {

        }

        function createPlot(data) {
            const X = data.X;
            const Y = data.Y;
            const Z_ce = data.Z_ce;
            const Z_cm = data.Z_cm;

            // CE 曲面 - 蓝色 #1a80bb

                type: 'surface',
                x: X,
                y: Y,
                z: Z_ce,
                name: 'CE Surface',
                colorscale: [[0, '#1a80bb'], [0.5, '#1a80bb'], [1, '#1a80bb']],
                opacity: 0.45,
                showscale: false,
                hovertemplate: 'τ_ID: %{x:.3f}<br>τ_OOD: %{y:.3f}<br>F1: %{z:.4f}<extra>CE</extra>',
                visible: true
            };

            // CutMix 曲面 - 橙色 #ea801c
            const surfaceCM = {
                type: 'surface',
                x: X,
                y: Y,
                z: Z_cm,
                name: 'CutMix Surface',
                colorscale: [[0, '#ea801c'], [0.5, '#ea801c'], [1, '#ea801c']],
                opacity: 0.45,
                showscale: false,
                hovertemplate: 'τ_ID: %{x:.3f}<br>τ_OOD: %{y:.3f}<br>F1: %{z:.4f}<extra>CutMix</extra>',
                visible: true
            };

            // CE 最优点 - 使用与曲面一致的深蓝色 #0f5a8c
            const pointCE = {
                type: 'scatter3d',
                mode: 'markers',
                x: [data.best_ce.msp],
                y: [data.best_ce.ood],
                z: [data.best_ce.f1],
                name: 'CE Best',
                marker: {
                    size: 12,
                    color: '#0f5a8c',
                    symbol: 'circle',
                    line: { color: 'white', width: 2.5 }

                type: 'scatter3d',
                mode: 'markers',
                x: [data.best_cm.msp],
                y: [data.best_cm.ood],
                z: [data.best_cm.f1],
                name: 'CutMix Best',
                marker: {
                    size: 12,
                    color: '#c66900',
                    symbol: 'diamond',
                    line: { color: 'white', width: 2.5 }
                },
                hovertemplate: 'CutMix Best<br>F1: %{z:.4f}<br>τ_ID: %{x:.4f}<br>τ_OOD: %{y:.4f}<extra></extra>'
            };

            const gapLine3D = {
                type: 'scatter3d',
                mode: 'lines',
                x: [data.best_ce.msp, data.best_cm.msp],
                y: [data.best_ce.ood, data.best_cm.ood],
                z: [data.best_ce.f1, data.best_cm.f1],
                name: 'Gap (3D)',
                line: {
                    color: '#22c55e',
                    width: 4
                },
                hovertemplate: 'Gap: ' + Math.abs(data.best_ce.f1 - data.best_cm.f1).toFixed(3) + '<extra></extra>'

            // 最优点在z=0平面的投影连线
            const gapLineProjected = {

                mode: 'lines',
                x: [data.best_ce.msp, data.best_cm.msp],
                y: [data.best_ce.ood, data.best_cm.ood],
                z: [0, 0],
                name: 'Gap (Projected)',
                line: {
                    color: '#22c55e',
                    width: 2,
                    dash: 'dash'
                },
                opacity: 0.5
            };

            // 从z=0到最优点的垂直线 (CE)
            const verticalCE = {
                type: 'scatter3d',
                mode: 'lines',
                x: [data.best_ce.msp, data.best_ce.msp],
                y: [data.best_ce.ood, data.best_ce.ood],
                z: [0, data.best_ce.f1],
                name: 'CE Vertical',
                line: {
                    color: '#3b82f6',
                    width: 2,
                    dash: 'dash'
                },
                showlegend: false
            };

            // 从z=0到最优点的垂直线 (CutMix)
            const verticalCM = {
                type: 'scatter3d',
                mode: 'lines',
                x: [data.best_cm.msp, data.best_cm.msp],
                y: [data.best_cm.ood, data.best_cm.ood],
                z: [0, data.best_cm.f1],
                name: 'CM Vertical',
                line: {

                        tickfont: { color: '#4b5563' },
                        gridcolor: '#e5e7eb',
                        backgroundcolor: '#ffffff'
                    },
                    zaxis: {
                        title: 'F1',
                        titlefont: { color: '#374151' },
                        tickfont: { color: '#4b5563' },
                        gridcolor: '#e5e7eb',
                        backgroundcolor: '#ffffff'
                    },
                    camera: {

                    },
                    bgcolor: '#ffffff'
                },
                paper_bgcolor: '#ffffff',

                },
                margin: { l: 0, r: 0, t: 50, b: 80 },
                hoverlabel: {
                    bgcolor: '#ffffff',
                    font: { color: '#374151' }

            };

                displayModeBar: true,
                scrollZoom: false,
                modeBarButtonsToRemove: ['lasso2d', 'select2d', 'orbitRotation', 'tableRotation'],
                toImageButtonOptions: {
                    format: 'png',
                    filename: 'overlay_surface_mnist',
                    height: 800,
                    width: 1200,
                    scale: 2
                }
            };

            Plotly.newPlot('surface-plot', traces, layout, config);
        }

        function resetView() {
            const update = {

        }

        // 初始化
        init();
